let _n=0;
function uid(){return 'u'+(++_n)+Date.now();}
function pad(n){return String(n).padStart(2,'0');}
function isoDate(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d);}
function todayIso(){var d=new Date();return isoDate(d.getFullYear(),d.getMonth(),d.getDate());}
function addDays(n){var d=new Date();d.setDate(d.getDate()+n);return isoDate(d.getFullYear(),d.getMonth(),d.getDate());}
function fmtDate(iso){return new Date(iso+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}

function monthMatrix(year,month){
  var first=new Date(year,month,1).getDay();
  var last=new Date(year,month+1,0).getDate();
  var days=[];
  for(var i=0;i<first;i++){var d=new Date(year,month,-first+i+1);days.push({date:isoDate(d.getFullYear(),d.getMonth(),d.getDate()),day:d.getDate(),inMonth:false});}
  for(var d2=1;d2<=last;d2++)days.push({date:isoDate(year,month,d2),day:d2,inMonth:true});
  while(days.length%7!==0){var idx=days.length-last-first;var d3=new Date(year,month+1,idx+1);days.push({date:isoDate(d3.getFullYear(),d3.getMonth(),d3.getDate()),day:d3.getDate(),inMonth:false});}
  var weeks=[];
  for(var j=0;j<days.length;j+=7)weeks.push(days.slice(j,j+7));
  return weeks;
}

function load(){
  try{
    var r=localStorage.getItem(STORAGE_KEY);
    if(r) return JSON.parse(r);
  }catch(e){}
  return seedData;
}

function AppProvider(props){
  const [data,setData]=useState(null);

  useEffect(function(){
    if(!sb)return;
    var alive=true;
    sb.from('agenda').select('data').eq('id',ROW_ID).maybeSingle().then(function(res){
      if(!alive)return;
      if(res.error){ console.error('Supabase:',res.error); return; }
      if(res.data&&res.data.data){ setData(res.data.data); }
      else{ var inicial=load(); sb.from('agenda').upsert({id:ROW_ID,data:inicial}).then(function(){}); setData(inicial); } // 1a vez: migra o que ja existia neste navegador
    });
    var channel=sb.channel('agenda-'+ROW_ID)
      .on('postgres_changes',{event:'*',schema:'public',table:'agenda',filter:'id=eq.'+ROW_ID},function(payload){
        if(payload.new&&payload.new.data) setData(payload.new.data);
      })
      .subscribe();
    return function(){ alive=false; sb.removeChannel(channel); };
  },[]);

  function commit(nd){ if(sb){ sb.from('agenda').upsert({id:ROW_ID,data:nd}).then(function(r){ if(r.error) console.error(r.error); }); } return nd; }
  function upd(fn){ setData(function(d){ return commit(fn(Object.assign({},d))); }); }
  var ctx={
    data:data,
    addTarefa:    function(t){upd(function(d){return Object.assign({},d,{tarefas:d.tarefas.concat([Object.assign({},t,{id:uid()})])});});},
    updateTarefa: function(t){upd(function(d){return Object.assign({},d,{tarefas:d.tarefas.map(function(x){return x.id===t.id?t:x;})});});},
    deleteTarefa: function(id){upd(function(d){return Object.assign({},d,{tarefas:d.tarefas.filter(function(x){return x.id!==id;})});});},
    addItemCal:   function(i){upd(function(d){return Object.assign({},d,{itensCalendario:d.itensCalendario.concat([Object.assign({},i,{id:uid()})])});});},
    updateItemCal:function(i){upd(function(d){return Object.assign({},d,{itensCalendario:d.itensCalendario.map(function(x){return x.id===i.id?i:x;})});});},
    deleteItemCal:function(id){upd(function(d){return Object.assign({},d,{itensCalendario:d.itensCalendario.filter(function(x){return x.id!==id;})});});},
    incrementMeta:function(id,delta){upd(function(d){return Object.assign({},d,{metasVolume:d.metasVolume.map(function(m){return m.id===id?Object.assign({},m,{feito:Math.max(0,m.feito+delta)}):m;})});});},
    addFaixa:     function(f){upd(function(d){return Object.assign({},d,{faixasSemana:d.faixasSemana.concat([Object.assign({},f,{id:uid()})])});});},
    updateFaixa:  function(f){upd(function(d){return Object.assign({},d,{faixasSemana:d.faixasSemana.map(function(x){return x.id===f.id?f:x;})});});},
    deleteFaixa:  function(id){upd(function(d){return Object.assign({},d,{faixasSemana:d.faixasSemana.filter(function(x){return x.id!==id;})});});},
    addNota:      function(n){upd(function(d){return Object.assign({},d,{notasIdeias:d.notasIdeias.concat([Object.assign({},n,{id:uid()})])});});},
    updateNota:   function(n){upd(function(d){return Object.assign({},d,{notasIdeias:d.notasIdeias.map(function(x){return x.id===n.id?n:x;})});});},
    deleteNota:   function(id){upd(function(d){return Object.assign({},d,{notasIdeias:d.notasIdeias.filter(function(x){return x.id!==id;})});});},
    updateBaseline:function(items){upd(function(d){return Object.assign({},d,{baseline:items});});},
    addSnapshot:  function(s){upd(function(d){return Object.assign({},d,{snapshots:d.snapshots.concat([Object.assign({},s,{id:uid()})])});});},
    exportJSON:function(){
      var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;a.download='deli-backup-'+todayIso()+'.json';a.click();
      URL.revokeObjectURL(url);
    },
    importJSON:function(json){ var nd=JSON.parse(json); commit(nd); setData(nd); },
    resetToSeed:function(){ if(confirm('Restaurar o conteudo inicial? Os dados atuais serao perdidos.')){ commit(seedData); setData(seedData); } },
  };
  if(data===null){
    return html`<div class="min-h-screen flex items-center justify-center text-gray-400 text-sm">Carregando agenda da nuvem...</div>`;
  }
  return html`<${Ctx.Provider} value=${ctx}>${props.children}</${Ctx.Provider}>`;
}
function useApp(){return useContext(Ctx);}

function Agenda(){
  var app=useApp();
  var data=app.data, addTarefa=app.addTarefa, updateTarefa=app.updateTarefa, deleteTarefa=app.deleteTarefa;
  const [fArea,setFArea]=useState('');
  const [fStat,setFStat]=useState('');
  const [fPrio,setFPrio]=useState('');
  const [fResp,setFResp]=useState('');
  const [fEst,setFEst]=useState('');
  const [busca,setBusca]=useState('');
  const [modal,setModal]=useState(null);
  const [col,setCol]=useState({});

  var marketing=data.areas.filter(function(a){return a.tipo==='marketing';}).sort(function(a,b){return a.ordem-b.ordem;});
  var engagement=data.areas.filter(function(a){return a.tipo==='engagement';}).sort(function(a,b){return a.ordem-b.ordem;});

  function tarefasDaArea(areaId){
    return data.tarefas.filter(function(t){
      if(t.areaId!==areaId)return false;
      if(fStat&&t.status!==fStat)return false;
      if(fPrio&&t.prioridade!==fPrio)return false;
      if(fResp&&t.responsavel!==fResp)return false;
      if(fEst&&t.estagio!==fEst)return false;
      if(busca&&t.titulo.toLowerCase().indexOf(busca.toLowerCase())<0)return false;
      return true;
    });
  }
  function pctArea(areaId){
    var ts=data.tarefas.filter(function(t){return t.areaId===areaId;});
    if(!ts.length)return 0;
    return Math.round(ts.filter(function(t){return t.status==='concluido';}).length/ts.length*100);
  }
  function toggleCol(id){setCol(function(s){var n=Object.assign({},s);n[id]=!n[id];return n;});}

  var sel='border border-gray-200 rounded-lg px-3 py-1.5 text-sm outline-none';
  var showEngagement=!fArea||engagement.some(function(a){return a.id===fArea;});

  return html`<div class="p-6 max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-900">Agenda</h1>
      <button onClick=${function(){setModal({tarefa:null});}} class="flex items-center gap-1.5 px-4 py-2 text-white text-sm rounded-xl transition-colors" style=${{background:BRAND}}>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Nova tarefa
      </button>
    </div>

    <div class="flex flex-wrap gap-2 mb-6">
      <input class=${sel+' w-44'} placeholder="Buscar..." value=${busca} onInput=${function(e){setBusca(e.target.value);}}/>
      <select class=${sel} value=${fArea} onChange=${function(e){setFArea(e.target.value);}}>
        <option value="">Todas as areas</option>
        ${data.areas.map(function(a){return html`<option key=${a.id} value=${a.id}>${a.nome}</option>`;})}
      </select>
      <select class=${sel} value=${fStat} onChange=${function(e){setFStat(e.target.value);}}>
        <option value="">Todos os status</option>
        <option value="a_fazer">A fazer</option>
        <option value="fazendo">Fazendo</option>
        <option value="concluido">Concluido</option>
      </select>
      <select class=${sel} value=${fPrio} onChange=${function(e){setFPrio(e.target.value);}}>
        <option value="">Todas as prioridades</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baixa">Baixa</option>
      </select>
      <select class=${sel} value=${fResp} onChange=${function(e){setFResp(e.target.value);}}>
        <option value="">Todos os responsaveis</option>
        ${RESP_NOMES.map(function(r){return html`<option key=${r} value=${r}>${r}</option>`;})}
      </select>
      <select class=${sel} value=${fEst} onChange=${function(e){setFEst(e.target.value);}}>
        <option value="">Todos os estagios</option>
        ${ESTAGIO_LISTA.map(function(e){return html`<option key=${e} value=${e}>${e}</option>`;})}
      </select>
    </div>

    <div class="space-y-3 mb-8">
      ${marketing.filter(function(a){return !fArea||a.id===fArea;}).map(function(a){return html`<${AreaBlock} key=${a.id}
        areaId=${a.id} nome=${a.nome}
        tarefas=${tarefasDaArea(a.id)} pct=${pctArea(a.id)}
        collapsed=${!!col[a.id]} onToggle=${function(){toggleCol(a.id);}}
        onAddTarefa=${function(){setModal({tarefa:null,defaultArea:a.id});}}
        onEditTarefa=${function(t){setModal({tarefa:t});}}
        onDeleteTarefa=${function(id){deleteTarefa(id);}}/>`;})}
    </div>

    ${showEngagement?html`<div>
      <div class="flex items-center gap-3 mb-3">
        <div class="h-px flex-1 bg-gray-200"/>
        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide px-2">Atividades adicionais (corte primeiro se apertar)</span>
        <div class="h-px flex-1 bg-gray-200"/>
      </div>
      <div class="space-y-3 opacity-75">
        ${engagement.filter(function(a){return !fArea||a.id===fArea;}).map(function(a){return html`<${AreaBlock} key=${a.id}
          areaId=${a.id} nome=${a.nome}
          tarefas=${tarefasDaArea(a.id)} pct=${pctArea(a.id)}
          collapsed=${!!col[a.id]} onToggle=${function(){toggleCol(a.id);}}
          onAddTarefa=${function(){setModal({tarefa:null,defaultArea:a.id});}}
          onEditTarefa=${function(t){setModal({tarefa:t});}}
          onDeleteTarefa=${function(id){deleteTarefa(id);}}/>`;})}
      </div>
    </div>`:''}

    ${modal?html`<${TarefaModal}
      tarefa=${modal.tarefa}
      areas=${data.areas}
      onSave=${function(f){
        if(modal.tarefa&&modal.tarefa.id)updateTarefa(Object.assign({},f,{id:modal.tarefa.id}));
        else addTarefa(Object.assign({},f,{areaId:f.areaId||(modal.defaultArea||data.areas[0].id)}));
      }}
      onClose=${function(){setModal(null);}}/>`:''}
  </div>`;
}

function CalItemChip(props){
  var item=props.item, onClick=props.onClick;
  var tipo=TIPO[item.tipo]||{bg:'#eee',text:'#333'};
  var feito=item.status==='feito';
  var agendado=item.status==='agendado';
  return html`<div
    onClick=${onClick}
    style=${{background:tipo.bg,color:tipo.text,opacity:feito?0.6:1}}
    class="text-xs px-1.5 py-0.5 rounded-full leading-snug cursor-pointer flex items-center gap-1">
    ${feito?html`<svg class="w-2.5 h-2.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>`:''}
    ${agendado?html`<span class="shrink-0 font-bold text-xs">*</span>`:''}
    ${item.responsavel&&RESP[item.responsavel]?html`<span style=${{background:RESP[item.responsavel].bg,color:RESP[item.responsavel].text}} class="inline-flex items-center justify-center w-3.5 h-3.5 rounded-full text-xs font-bold shrink-0">${RESP[item.responsavel].inicial}</span>`:''}
    <span class="truncate" style=${{textDecoration:feito?'line-through':'none'}}>${item.titulo}</span>
  </div>`;
}

function Calendario(){
  var app=useApp();
  var data=app.data, addItemCal=app.addItemCal, updateItemCal=app.updateItemCal, deleteItemCal=app.deleteItemCal;
  var addFaixa=app.addFaixa, updateFaixa=app.updateFaixa, deleteFaixa=app.deleteFaixa;
  var addNota=app.addNota, updateNota=app.updateNota, deleteNota=app.deleteNota;
  var today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [selDia,setSelDia]=useState(null);
  const [selItem,setSelItem]=useState(null);
  const [faixaMod,setFaixaMod]=useState(null);
  const [notaEdit,setNotaEdit]=useState(null);
  const [addingNota,setAddingNota]=useState(false);
  const [nTit,setNTit]=useState('');
  const [nItens,setNItens]=useState('');

  var weeks=monthMatrix(year,month);
  var todayStr=todayIso();

  function prev(){if(month===0){setYear(function(y){return y-1;});setMonth(11);}else setMonth(function(m){return m-1;});}
  function next(){if(month===11){setYear(function(y){return y+1;});setMonth(0);}else setMonth(function(m){return m+1;});}
  function itensDia(date){return data.itensCalendario.filter(function(i){return i.data===date;});}
  function faixaDaSemana(semana){
    var first=semana.find(function(d){return d.inMonth;});
    if(!first)return null;
    return data.faixasSemana.find(function(f){return f.inicio<=first.date&&first.date<=f.fim;})||null;
  }

  var campanhasAtivas=data.tarefas.filter(function(t){return t.areaId==='ads'&&t.status==='fazendo';});

  return html`<div class="p-6 max-w-6xl mx-auto">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold text-gray-900">Calendario de Conteudo</h1>
      <div class="flex items-center gap-2">
        <button onClick=${prev} class="p-1.5 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <span class="text-base font-semibold text-gray-800 w-48 text-center">${MESES[month]} ${year}</span>
        <button onClick=${next} class="p-1.5 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>

    ${campanhasAtivas.length?html`<div class="mb-4 px-4 py-2 rounded-xl flex items-center gap-3 flex-wrap" style=${{background:'#FFF3EE',border:'1px solid '+BRAND}}>
      <span class="text-xs font-bold" style=${{color:BRAND}}>Campanhas no ar</span>
      ${campanhasAtivas.map(function(t){return html`<span key=${t.id} class="text-xs font-medium px-2 py-0.5 rounded-full text-white" style=${{background:BRAND}}>${t.titulo}</span>`;})}
    </div>`:''}

    <div class="flex flex-wrap gap-2 mb-4">
      ${Object.keys(TIPO).filter(function(k){return k!=='tema';}).map(function(k){return html`
        <span key=${k} style=${{background:TIPO[k].bg,color:TIPO[k].text}} class="text-xs px-2 py-0.5 rounded-full font-medium">${TIPO[k].label}</span>`;})}
      <span class="text-xs px-2 py-0.5 rounded-full font-medium bg-yellow-100 text-yellow-800">Notas</span>
      <span class="text-gray-300 mx-1 text-xs">|</span>
      ${RESP_NOMES.map(function(r){return html`<span key=${r} style=${{background:RESP[r].bg,color:RESP[r].text}} class="text-xs px-2 py-0.5 rounded-full font-medium">${r}</span>`;})}
    </div>

    <div class="flex gap-5">
      <div class="flex-1 min-w-0">
        <div class="grid grid-cols-7 mb-1">
          ${DSEM.map(function(d){return html`<div key=${d} class="text-center text-xs font-semibold text-gray-400 py-1">${d}</div>`;})}
        </div>
        <div class="space-y-1.5">
          ${weeks.map(function(semana,wi){
            var faixa=faixaDaSemana(semana);
            var firstIn=semana.find(function(d){return d.inMonth;});
            return html`<div key=${wi}>
              ${faixa
                ?html`<div class="mb-1 group relative">
                  <div style=${{background:'#BAE6FD',color:'#0c4a6e'}} class="text-xs font-semibold px-3 py-1 rounded-lg text-center">${faixa.texto}</div>
                  <button onClick=${function(){setFaixaMod(faixa);}} class="absolute right-2 top-0.5 opacity-0 group-hover:opacity-100 text-sky-500 hover:text-sky-700 text-xs transition-opacity">editar</button>
                </div>`
                :html`<div class="mb-1 h-7 flex items-center justify-center">
                  ${firstIn?html`<button onClick=${function(){setFaixaMod({_new:true,inicio:firstIn.date,fim:semana[6].date,texto:''}); }}
                    class="text-xs text-gray-300 hover:text-sky-400 transition-colors">+ tema da semana</button>`:''}
                </div>`
              }
              <div class="grid grid-cols-7 gap-1">
                ${semana.map(function(cell){
                  var date=cell.date, day=cell.day, inMonth=cell.inMonth;
                  var isToday=date===todayStr;
                  var itens=itensDia(date);
                  var cellClass='min-h-[80px] rounded-xl border p-1.5 cursor-pointer transition-colors '
                    +(inMonth?'bg-white hover:bg-orange-50 border-gray-100':'bg-gray-50/60 border-gray-50')
                    +(isToday?' border-orange-300 ring-1 ring-orange-200':'');
                  var dayClass='text-xs font-medium mb-1 '+(isToday?'text-orange-600':inMonth?'text-gray-700':'text-gray-300');
                  return html`<div key=${date}
                    onClick=${function(){setSelDia(date);setSelItem(null);}}
                    class=${cellClass}>
                    <div class=${dayClass}>${day}</div>
                    <div class="space-y-0.5">
                      ${itens.map(function(item){return html`<${CalItemChip} key=${item.id} item=${item} onClick=${function(e){e.stopPropagation();setSelDia(date);setSelItem(item);}}/>`;})}
                    </div>
                  </div>`;
                })}
              </div>
            </div>`;
          })}
        </div>
      </div>

      <div class="w-52 shrink-0 space-y-3">
        <p class="text-sm font-semibold text-gray-700">Notas e ideias</p>
        ${data.notasIdeias.map(function(nota){return html`<div key=${nota.id} style=${{background:'#fefce8',border:'1px solid #fde68a'}} class="rounded-xl p-3">
          ${notaEdit===nota.id
            ?html`<${NotaEdit} nota=${nota} onSave=${function(n){updateNota(n);setNotaEdit(null);}} onCancel=${function(){setNotaEdit(null);}} onDelete=${function(){deleteNota(nota.id);setNotaEdit(null);}}/>`
            :html`<div>
              <div class="flex items-center justify-between mb-2">
                <p class="text-xs font-semibold text-yellow-800">${nota.titulo}</p>
                <button onClick=${function(){setNotaEdit(nota.id);}} class="text-yellow-500 hover:text-yellow-700">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828A2 2 0 0110 16H8v-2a2 2 0 01.586-1.414z"/></svg>
                </button>
              </div>
              <ul class="space-y-1">
                ${nota.itens.map(function(item,i){return html`<li key=${i} class="text-xs text-yellow-900 flex items-start gap-1"><span class="text-yellow-400 mt-0.5">*</span>${item}</li>`;})}
              </ul>
            </div>`
          }
        </div>`;})}
        ${addingNota
          ?html`<div style=${{background:'#fefce8',border:'1px solid #fde68a'}} class="rounded-xl p-3 space-y-2">
            <input class="w-full text-xs border border-yellow-200 rounded px-2 py-1 outline-none bg-white/80" placeholder="Titulo" value=${nTit} onInput=${function(e){setNTit(e.target.value);}}/>
            <textarea class="w-full text-xs border border-yellow-200 rounded px-2 py-1 resize-none outline-none bg-white/80" rows="3" placeholder="Itens (um por linha)" onInput=${function(e){setNItens(e.target.value);}}>${nItens}</textarea>
            <div class="flex gap-2">
              <button class="text-xs text-yellow-700 font-medium" onClick=${function(){addNota({titulo:nTit,itens:nItens.split('\n').filter(Boolean)});setAddingNota(false);setNTit('');setNItens('');}}>Salvar</button>
              <button class="text-xs text-gray-400" onClick=${function(){setAddingNota(false);}}>Cancelar</button>
            </div>
          </div>`
          :html`<button onClick=${function(){setAddingNota(true);}} class="text-xs text-yellow-600 hover:text-yellow-800 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Adicionar nota
          </button>`
        }
      </div>
    </div>

    ${selDia?html`<${ItemCalModal} data=${selDia} item=${selItem}
      onSave=${function(f){if(f.id)updateItemCal(f);else addItemCal(Object.assign({},f,{data:selDia}));}}
      onDelete=${selItem?function(){deleteItemCal(selItem.id);}:null}
      onClose=${function(){setSelDia(null);setSelItem(null);}}/>`:''}

    ${faixaMod!==null?html`<${FaixaModal}
      faixa=${faixaMod._new?null:faixaMod}
      onSave=${function(f){if(faixaMod._new||!faixaMod.id)addFaixa(f);else updateFaixa(Object.assign({},faixaMod,f));}}
      onDelete=${faixaMod.id?function(){deleteFaixa(faixaMod.id);}:null}
      onClose=${function(){setFaixaMod(null);}}/>`:''}
  </div>`;
}

  var totalFeito=data.metasVolume.reduce(function(a,m){return a+m.feito;},0);
  var cadencia=totalMeta>0?Math.round(totalFeito/totalMeta*100):0;
  function areaName(id){var a=data.areas.find(function(a){return a.id===id;});return a?a.nome:id;}

              ${t.prazo?html`<p class="text-xs text-gray-400 mt-1">Prazo: ${new Date(t.prazo+'T12:00:00').toLocaleDateString('pt-BR')}</p>`:''}

            ${calSemana.length>0?html`<div>
              <p class="text-xs font-medium text-gray-500 mt-3 mb-1">Conteudo agendado</p>
              ${calSemana.map(function(i){return html`<div key=${i.id} class="flex items-center gap-2 text-sm text-gray-700 py-0.5">
                <span class="text-xs text-gray-400">${fmtDate(i.data)}</span>
                <${RespChip} v=${i.responsavel}/>
                <span class="flex-1">${i.titulo}</span>
                ${i.status==='feito'?html`<span class="text-xs text-green-500">feito</span>`:i.status==='agendado'?html`<span class="text-xs text-orange-500">agendado</span>`:''}
              </div>`;})}
            </div>`:''}
          </div>`
        }
      </section>

      <section class="md:col-span-2">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold text-gray-800 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-400 inline-block"/>Metas do mes
          </h2>
          <span class="text-sm text-gray-500">Cadencia geral: <strong>${cadencia}%</strong></span>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
          ${data.metasVolume.map(function(m){
            var pct=m.meta>0?Math.min(100,Math.round(m.feito/m.meta*100)):0;
            var barColor=pct>=100?'#4ade80':pct>=50?BRAND:'#fbbf24';
            return html`<div key=${m.id} class="bg-white border border-gray-100 rounded-xl p-3">
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm text-gray-700 font-medium">${m.rotulo}</span>
                <span class="text-sm font-bold text-gray-900">${m.feito}/${m.meta}</span>
              </div>
              <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden mb-2">
                <div class="h-full rounded-full" style=${{width:pct+'%',background:barColor}}/>
              </div>
              <div class="flex items-center justify-between">
                <span class="text-xs text-gray-400">${pct}%</span>
                <div class="flex gap-1">
                  <button onClick=${function(){incrementMeta(m.id,-1);}} class="w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-bold flex items-center justify-center">-</button>
                  <button onClick=${function(){incrementMeta(m.id,1);}} class="w-6 h-6 rounded-full text-white text-sm font-bold flex items-center justify-center" style=${{background:BRAND}}>+</button>
                </div>
              </div>
            </div>`;
          })}
        </div>
      </section>

      <section class="md:col-span-2">
        <h2 class="text-sm font-semibold text-gray-800 mb-3 flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-red-400 inline-block"/>Alta prioridade pendente
        </h2>
        ${altaPrio.length===0
          ?html`<p class="text-sm text-gray-400 italic">Nenhuma tarefa de alta prioridade pendente.</p>`
          :html`<div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            ${altaPrio.map(function(t){return html`<div key=${t.id} class="bg-red-50 border border-red-100 rounded-xl p-3 flex items-start justify-between gap-2">
              <div class="min-w-0">
                <p class="text-sm text-gray-800 leading-snug">${t.titulo}</p>
                <p class="text-xs text-gray-500 mt-0.5">${areaName(t.areaId)}</p>
              </div>
              <div class="flex items-center gap-1 shrink-0">
                <${RespChip} v=${t.responsavel}/>
                <${SPill} v=${t.status}/>
              </div>
            </div>`;})}
          </div>`
        }
      </section>
    </div>
  </div>`;
}

// ── METRICAS ─────────────────────────────────────────────────────────────────

function Metricas(){
  var app=useApp();
  var data=app.data, updateBaseline=app.updateBaseline, addSnapshot=app.addSnapshot;
  const [notas,setNotas]=useState('');
  const [checks,setChecks]=useState({});
  var totalMeta=data.metasVolume.reduce(function(a,m){return a+m.meta;},0);
  var totalFeito=data.metasVolume.reduce(function(a,m){return a+m.feito;},0);
  var cadencia=totalMeta>0?Math.round(totalFeito/totalMeta*100):0;
  var checklist=[
    'Revisar cadencia de entregaveis de marketing',
    'Revisar cadencia de acoes de engagement',
    'Comparar metricas com baseline e periodo anterior',
    'Registrar o que funcionou e o que nao funcionou',
    'Definir ajustes para o proximo periodo',
    'Atualizar o baseline com os novos numeros',
  ];
  var inp='border border-gray-200 rounded-lg px-3 py-1.5 text-sm w-40 outline-none';
  var barColor=cadencia>=100?'#4ade80':cadencia>=70?BRAND:'#fbbf24';

  return html`<div class="p-6 max-w-3xl mx-auto space-y-8">
    <h1 class="text-2xl font-bold text-gray-900">Metricas e Governanca</h1>

    <section class="bg-white border border-gray-100 rounded-2xl p-5">
      <h2 class="text-base font-semibold text-gray-800 mb-4">Cadencia de entregaveis do mes</h2>
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm text-gray-600">Entregaveis publicados</span>
        <span class="text-xl font-bold text-gray-900">${cadencia}%</span>
      </div>
      <div class="w-full h-3 bg-gray-100 rounded-full overflow-hidden mb-1">
        <div class="h-full rounded-full" style=${{width:Math.min(100,cadencia)+'%',background:barColor}}/>
      </div>
      <p class="text-xs text-gray-400 mb-4">Meta: 100% de cumprimento</p>
      <div class="space-y-2">
        ${data.metasVolume.map(function(m){
          var pct=m.meta>0?Math.min(100,Math.round(m.feito/m.meta*100)):0;
          var bc=pct>=100?'#4ade80':pct>=50?BRAND:'#fbbf24';
          return html`<div key=${m.id} class="flex items-center gap-3">
            <span class="text-sm text-gray-700 w-40 shrink-0">${m.rotulo}</span>
            <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
              <div class="h-full rounded-full" style=${{width:pct+'%',background:bc}}/>
            </div>
            <span class="text-sm text-gray-600 w-12 text-right shrink-0">${m.feito}/${m.meta}</span>
          </div>`;
        })}
      </div>
    </section>

    <section class="bg-white border border-gray-100 rounded-2xl p-5">
      <h2 class="text-base font-semibold text-gray-800 mb-1">Baseline de metricas</h2>
      <p class="text-xs text-gray-500 mb-4">Sem baseline voce nao consegue provar se algo caiu. Preencha antes de comecar qualquer acao.</p>
      <div class="space-y-3">
        ${data.baseline.map(function(b){return html`<div key=${b.id} class="flex items-center gap-3">
          <label class="text-sm text-gray-700 flex-1">${b.rotulo}</label>
          <input class=${inp} value=${b.valor} onInput=${function(e){updateBaseline(data.baseline.map(function(x){return x.id===b.id?Object.assign({},x,{valor:e.target.value}):x;}));}} placeholder="ex: 1.200"/>
        </div>`;})}
      </div>
    </section>

    <section class="bg-white border border-gray-100 rounded-2xl p-5">
      <h2 class="text-base font-semibold text-gray-800 mb-1">Report quinzenal</h2>
      <p class="text-xs text-gray-500 mb-4">1 pagina comparando cadencia cumprida e principais metricas versus o periodo anterior.</p>
      <div class="bg-gray-50 rounded-xl p-4 mb-4">
        <p class="text-sm font-medium text-gray-700 mb-2">Checklist</p>
        <ul class="space-y-1.5">
          ${checklist.map(function(item,i){return html`<li key=${i} class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer" onClick=${function(){setChecks(function(c){var n=Object.assign({},c);n[i]=!n[i];return n;});}}>
            <span class=${('w-4 h-4 rounded border flex items-center justify-center text-xs shrink-0 transition-colors ')+(checks[i]?'text-white':'border-gray-300')} style=${checks[i]?{background:BRAND,borderColor:BRAND}:{}}>${checks[i]?'v':''}</span>
            <span class=${checks[i]?'line-through text-gray-400':''}>${item}</span>
          </li>`;})}
        </ul>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Notas da quinzena</label>
        <textarea class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm resize-none outline-none" rows="4"
          placeholder="Principais aprendizados, ajustes e proximos passos..." onInput=${function(e){setNotas(e.target.value);}}>${notas}</textarea>
      </div>
      <button onClick=${function(){addSnapshot({data:todayIso(),cadenciaCumprida:cadencia,notas:notas});setNotas('');setChecks({});}}
        class="px-4 py-2 text-white text-sm rounded-xl transition-colors" style=${{background:BRAND}}>
        Fechar quinzena (salvar snapshot)
      </button>
    </section>

    ${data.snapshots.length>0?html`<section class="bg-white border border-gray-100 rounded-2xl p-5">
      <h2 class="text-base font-semibold text-gray-800 mb-4">Historico de quinzenas</h2>
      <div class="space-y-3">
        ${data.snapshots.slice().sort(function(a,b){return b.data.localeCompare(a.data);}).map(function(s){return html`<div key=${s.id} class="border border-gray-100 rounded-xl p-4">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-medium text-gray-700">${new Date(s.data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})}</span>
            <span class=${('text-sm font-bold ')+(s.cadenciaCumprida>=80?'text-green-600':'text-amber-600')}>${s.cadenciaCumprida}% cadencia</span>
          </div>
          ${s.notas?html`<p class="text-xs text-gray-600 whitespace-pre-wrap">${s.notas}</p>`:''}
        </div>`;})}
      </div>
    </section>`:''}
  </div>`;
}

// ── APP SHELL ─────────────────────────────────────────────────────────────────

var TELAS=[
  {id:'hoje',label:'Visao Geral'},
  {id:'agenda',label:'Agenda'},
  {id:'calendario',label:'Calendario'},
  {id:'metricas',label:'Metricas'},
];

function AppShell(){
  var app=useApp();
  var u=useContext(UserCtx);
  const [tela,setTela]=useState('hoje');
  const importRef=useRef(null);

  function handleImport(e){
    var file=e.target.files&&e.target.files[0];
    if(!file)return;
    var r=new FileReader();
    r.onload=function(ev){try{app.importJSON(ev.target.result);alert('Importado com sucesso.');}catch(err){alert('Arquivo invalido.');}};
    r.readAsText(file);
    e.target.value='';
  }

  return html`<div class="min-h-screen bg-gray-50">
    <nav class="bg-white border-b border-gray-100 sticky top-0 z-40">
      <div class="max-w-6xl mx-auto px-6 flex items-center justify-between h-14">
        <div class="flex items-center gap-5">
          <span class="font-bold tracking-tight flex items-center gap-2">
            <span class="text-white text-sm font-bold px-2 py-0.5 rounded-lg" style=${{background:BRAND,letterSpacing:'0.08em'}}>DELI</span>
            <span class="text-gray-600 font-normal text-sm">Marketing</span>
          </span>
          <div class="flex gap-0.5">
            ${TELAS.map(function(t){
              var ativo=tela===t.id;
              return html`<button key=${t.id} onClick=${function(){setTela(t.id);}}
                class=${('px-3 py-1.5 text-sm rounded-lg transition-colors font-medium ')+(ativo?'text-white':'text-gray-500 hover:text-gray-800 hover:bg-gray-50')}
                style=${ativo?{background:BRAND}:{}}>
                ${t.label}
              </button>`;
            })}
          </div>
        </div>
        <div class="flex items-center gap-1">
          <button onClick=${app.exportJSON} class="text-xs text-gray-500 hover:text-gray-700 px-3 py-1.5 rounded-lg hover:bg-gray-100 transition-colors">Exportar JSON</button>
          <button onClick=${function(){importRef.current&&importRef.current.click();}} class="text-xs text-gray-500 hover:text-gray-700 px-3 py-1.5 rounded-lg hover:bg-gray-100 transition-colors">Importar JSON</button>
          <button onClick=${app.resetToSeed} class="text-xs text-gray-400 hover:text-red-500 px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">Restaurar conteudo inicial</button>
          <input ref=${importRef} type="file" accept=".json" class="hidden" onChange=${handleImport}/>
          ${u?html`<span class="w-px h-5 bg-gray-200 mx-1"></span>
            <span class="text-xs text-gray-400 hidden md:inline" title=${u.user.email}>${(u.user.email||'').split('@')[0]}</span>
            <button onClick=${u.logout} class="text-xs text-gray-500 hover:text-red-500 px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">Sair</button>`:''}
        </div>
      </div>
    </nav>
    <main>
      ${tela==='hoje'?html`<${Hoje}/>`:''}
      ${tela==='agenda'?html`<${Agenda}/>`:''}
      ${tela==='calendario'?html`<${Calendario}/>`:''}
      ${tela==='metricas'?html`<${Metricas}/>`:''}
    </main>
  </div>`;
}

// ── LOGIN / ACESSO ───────────────────────────────────────────────────────────

function LoginScreen(props){
  const [email,setEmail]=useState('');
  const [senha,setSenha]=useState('');
  var inp='w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-gray-400';
  function submit(e){ e.preventDefault(); props.onLogin(email,senha); }
  return html`<div class="min-h-screen flex items-center justify-center bg-gray-50 p-6">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 w-full max-w-sm p-8 text-center">
      <span class="text-white text-lg font-bold px-3 py-1 rounded-lg inline-block mb-5" style=${{background:BRAND,letterSpacing:'0.08em'}}>DELI</span>
      <h1 class="text-lg font-semibold text-gray-900 mb-1">Marketing</h1>
      <p class="text-sm text-gray-500 mb-6">Acesso restrito ao time. Entre com seu email e senha.</p>
      <form onSubmit=${submit} class="space-y-3">
        <input class=${inp} type="email" placeholder="voce@deli.com.br" value=${email} onInput=${function(e){setEmail(e.target.value);}} autoFocus/>
        <input class=${inp} type="password" placeholder="Senha" value=${senha} onInput=${function(e){setSenha(e.target.value);}}/>
        <button type="submit" disabled=${props.loading||!email.trim()||!senha} class="w-full text-white text-sm font-medium rounded-xl px-4 py-2.5 transition-colors disabled:opacity-40" style=${{background:BRAND}}>
          ${props.loading?'Entrando...':'Entrar'}
        </button>
      </form>
      ${props.erro?html`<p class="text-xs text-red-500 mt-4">${props.erro}</p>`:''}
    </div>
  </div>`;
}

function ConfigScreen(){
  return html`<div class="min-h-screen flex items-center justify-center bg-gray-50 p-6">
    <div class="bg-white rounded-2xl shadow border border-gray-100 max-w-md p-8">
      <h1 class="text-lg font-semibold text-gray-900 mb-2">Falta configurar o Supabase</h1>
      <p class="text-sm text-gray-600 mb-3">Abra este arquivo e preencha o <code class="bg-gray-100 px-1 rounded">SUPABASE_URL</code>, a <code class="bg-gray-100 px-1 rounded">SUPABASE_ANON_KEY</code> e a lista <code class="bg-gray-100 px-1 rounded">ALLOWED_EMAILS</code> no topo do bloco de script, seguindo o passo a passo.</p>
      <p class="text-xs text-gray-400">Enquanto isso, o login e a sincronizacao ficam desativados.</p>
    </div>
  </div>`;
}

function AuthGate(props){
  const [user,setUser]=useState(function(){ try{ var s=localStorage.getItem('deli_auth'); return s?JSON.parse(s):null; }catch(e){ return null; } });
  const [erro,setErro]=useState('');

  function entrar(email,senha){
    var e=(email||'').trim().toLowerCase();
    var u=USERS.find(function(x){ return x.email.toLowerCase()===e; });
    if(!u || u.senha!==senha){ setErro('Email ou senha incorretos.'); return; }
    var info={ email:u.email, nome:u.nome };
    try{ localStorage.setItem('deli_auth', JSON.stringify(info)); }catch(e2){}
    setErro(''); setUser(info);
  }
  function logout(){ try{ localStorage.removeItem('deli_auth'); }catch(e){} setUser(null); }

  if(!user){
    return html`<${LoginScreen} onLogin=${entrar} erro=${erro}/>`;
  }
  return html`<${UserCtx.Provider} value=${{user:user,logout:logout}}>${props.children}</${UserCtx.Provider}>`;
}

function App(){
  if(!CONFIG_OK){ return html`<${ConfigScreen}/>`; }
  return html`<${AuthGate}><${AppProvider}><${AppShell}/></${AppProvider}></${AuthGate}>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
